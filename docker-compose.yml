services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
      target: website-production
    image: nana-club-website:latest
    restart: unless-stopped
    command: node website-server.js
    environment:
      - NODE_ENV=production
      - PORT=${WEBSITE_PORT:-3001}
      - DATA_FILE=/app/data/data.json
      - UPLOADS_DIR=/app/uploads
    ports:
      - "127.0.0.1:${WEBSITE_PORT:-3001}:${WEBSITE_PORT:-3001}"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${WEBSITE_PORT:-3001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # In Coolify, assign this service domain as: https://nana.ibnbatoutaweb.com:3001

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-production
    image: nana-club-admin:latest
    restart: unless-stopped
    command: node admin-server.js
    environment:
      - NODE_ENV=production
      - PORT=${ADMIN_PORT:-3101}
      - DATA_FILE=/app/data/data.json
      - UPLOADS_DIR=/app/uploads
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-change-me-now}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    ports:
      - "127.0.0.1:${ADMIN_PORT:-3101}:${ADMIN_PORT:-3101}"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${ADMIN_PORT:-3101}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # In Coolify, assign this service domain as: https://admin.nana.ibnbatoutaweb.com:3101

volumes:
  app_data:
  app_uploads:
