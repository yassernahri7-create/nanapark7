name: Deploy to Coolify

on:
  push:
    branches:
      - main
      - staging

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        shell: bash
        run: |
          set -euo pipefail
          test -f Dockerfile
          test -f docker-compose.yml
          test -f website-server.js
          test -f admin-server.js

      - name: Syntax check JavaScript files
        shell: bash
        run: |
          set -euo pipefail
          node --check website-server.js
          node --check admin-server.js
          node --check site-store.js
          node --check server-common.js
          node --check admin.js
          node --check i18n.js

  deploy-production:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify production deploy
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.COOLIFY_WEBHOOK_PROD }}" ] || [ -z "${{ secrets.COOLIFY_TOKEN_PROD }}" ]; then
            echo "COOLIFY_WEBHOOK_PROD or COOLIFY_TOKEN_PROD is not set. Skipping production deploy."
            exit 0
          fi
          curl --fail --silent --show-error --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN_PROD }}" \
            "${{ secrets.COOLIFY_WEBHOOK_PROD }}"

  deploy-staging:
    needs: validate
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify staging deploy
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.COOLIFY_WEBHOOK_STAGING }}" ] || [ -z "${{ secrets.COOLIFY_TOKEN_STAGING }}" ]; then
            echo "COOLIFY_WEBHOOK_STAGING or COOLIFY_TOKEN_STAGING is not set. Skipping staging deploy."
            exit 0
          fi
          curl --fail --silent --show-error --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN_STAGING }}" \
            "${{ secrets.COOLIFY_WEBHOOK_STAGING }}"
